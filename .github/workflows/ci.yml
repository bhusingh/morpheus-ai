name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Test
        run: pytest tests/ -v --tb=short

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Verify wheel contents
        run: |
          python -c "
          import zipfile
          from pathlib import Path
          whl = list(Path('dist').glob('*.whl'))[0]
          with zipfile.ZipFile(whl) as z:
              names = z.namelist()
              packs = [n for n in names if 'packs/' in n and n.endswith('.yaml')]
              assert len(packs) == 3, f'Expected 3 pack files, got {len(packs)}: {packs}'
              print(f'Wheel OK: {len(names)} files, {len(packs)} packs')
          "

      - name: Smoke test from wheel
        run: |
          pip install dist/*.whl
          echo "We could just skip it" | ai-watchdog check --stdin --pack strict 2>&1 || true
          ai-watchdog --version
