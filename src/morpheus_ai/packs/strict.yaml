# Strict rule pack — catches all lazy AI patterns
# Use: morpheus-ai check --pack strict --stdin

rules:
  - name: no-scope-reduction
    severity: BLOCK
    description: Agent must not suggest skipping, deferring, or reducing requested scope
    patterns:
      - "(?i)\\b(skip|skipping)\\b[^\\n]{0,40}\\b(for now|for the moment|initially|first)"
      - "(?i)\\bwe (could|can|might) (just|simply|instead)\\b"
      - "(?i)\\bdefer\\b[^\\n]{0,20}\\b(to|until|for)\\b"
      - "(?i)\\bstart with (just|only)\\b"
      - "(?i)\\binstead of [^,]{5,50}, (we|let's|I'll)\\b"
      - "(?i)\\b(simplest|easiest|quickest) (approach|path|way|option)\\b"
      - "(?i)\\bfor now[^\\n]{0,10}(skip|omit|leave|ignore)\\b"
    examples:
      match:
        - "We could skip the GPU stages for now and just run the CPU stages"
        - "Let's start with just the entity extraction"
        - "Instead of building the full pipeline, we could..."
        - "The simplest approach would be to only run stage 1"
      no_match:
        - "Stage 1 skips chunks that are already annotated"
        - "The skip logic in the loop prevents duplicate processing"

  - name: no-option-offering
    severity: BLOCK
    description: Agent must not present A/B/C options when user gave a clear directive
    patterns:
      - "(?i)\\bOption [A-Z]\\b[:\\-—]"
      - "(?i)\\b(want me to|should I|shall (?:we|I)|do you (?:want|prefer))\\b[^\\n]{0,80}\\?"
      - "(?i)\\bhere are [^\\n]{0,15}(?:options|approaches|alternatives)\\b"
      - "(?i)\\bwe (?:have|can consider) (?:several|a few|two|three|multiple) (?:options|approaches|paths)\\b"
      - "(?i)\\bwhich [^\\n]{0,20}(?:prefer|want|approach|option)\\b[^\\n]*\\?"
    examples:
      match:
        - "Option A: Run partial pipeline\nOption B: Build everything"
        - "Want me to proceed with the full setup or just the Docker part?"
        - "Here are three approaches we could take"
        - "Should I start with the infrastructure changes?"
      no_match:
        - "The pipeline supports option flags via --stages"
        - "Configuration options are documented in config.yaml"

  - name: no-deferral
    severity: BLOCK
    description: Agent must not suggest doing work later when user asked for it now
    patterns:
      - "(?i)\\b(later|afterwards|in a follow-up|next session|separate PR)\\b[^\\n]{0,30}\\b(we can|I'll|let's|could)\\b"
      - "(?i)\\b(can|could) (?:be|do) [^\\n]{0,20}(later|afterwards|separately|in a follow-up|in a separate PR)\\b"
      - "(?i)\\bleave [^\\n]{0,30} for (later|now|another|a future)\\b"
      - "(?i)\\bpark(?:ed|ing)? [^\\n]{0,15}(for now|for later|this)\\b"
      - "(?i)\\bbacklog\\b[^\\n]{0,20}\\b(add|put|move|track)\\b"
      - "(?i)\\b(future work|follow-up|next step)\\b[^\\n]{0,30}\\b(would be|is to|could be)\\b"
    examples:
      match:
        - "Later in a follow-up we can add the search index build"
        - "This could be done separately in a next session"
        - "I'll leave the infrastructure changes for a future PR"
        - "Let's park this for now and focus on..."
      no_match:
        - "The cron job runs later at midnight UTC"
        - "Backlogged items are tracked in ISSUES-TRACKER.md"

  - name: no-premature-confirmation
    severity: WARN
    description: Agent should not ask for permission to do what was already requested
    patterns:
      - "(?i)\\b(want me to|shall I|should I|ready to|can I)\\b[^\\n]{0,40}(proceed|continue|go ahead|start|begin|do this)\\b"
      - "(?i)\\bLet me know (?:if|when|whether)\\b[^\\n]{0,30}\\b(proceed|continue|ready)\\b"
      - "(?i)\\bAwaiting [^\\n]{0,20}(approval|confirmation|go-ahead)\\b"
    examples:
      match:
        - "Want me to proceed with the implementation?"
        - "Should I go ahead and build this?"
        - "Let me know when you're ready to proceed"
      no_match:
        - "I'll proceed with the fix"
        - "The system awaits confirmation from the user via the UI"

  - name: no-excessive-planning
    severity: WARN
    description: Agent should not plan excessively when action was requested
    multiline: true
    patterns:
      - "(?i)\\b(?:first|before)[^\\n]{0,30}(?:let me|I'll|we should)[^\\n]{0,20}(?:plan|outline|map out|think through)\\b"
      - "(?i)\\bhere'?s (?:the|my|a|an) (?:plan|approach|strategy|roadmap)\\b"
      - "(?i)step 1:[\\s\\S]{0,80}step 2:[\\s\\S]{0,80}step 3:"
    examples:
      match:
        - "Before we start, let me plan the approach"
        - "Here's my strategy for implementing this"
      no_match:
        - "The deployment plan is documented in docs/deployment.md"

  - name: no-scope-creep-warnings
    severity: WARN
    description: Agent should not warn about scope being too large when user chose the scope
    patterns:
      - "(?i)\\bthis (?:is|seems|looks) (?:quite|pretty|very|fairly) (?:a )?(?:large|big|ambitious|complex)\\b"
      - "(?i)\\b(?:might (?:be|take) (?:a lot|too|quite)|are you sure|that's a lot)\\b"
      - "(?i)\\bbreak [^\\n]{0,20}(?:into|down)[^\\n]{0,20}(?:smaller|phases|parts|pieces)\\b"
    examples:
      match:
        - "This is quite a large change — might want to break it into smaller PRs"
        - "Are you sure you want to do all of this at once?"
      no_match:
        - "This is a large model (8.9B params) that needs 17.8GB VRAM"

  - name: no-hedging
    severity: INFO
    description: Detect hedging language that indicates the agent is unsure but should just do it
    patterns:
      - "(?i)\\b(?:I think|I believe|probably|perhaps|maybe|arguably|it seems like)\\b[^\\n]{0,40}(?:we should|we could|I'd suggest)"
      - "(?i)\\b(?:not sure if|uncertain whether|hard to say)\\b"
    examples:
      match:
        - "I think we should probably use the Azure provider"
        - "Maybe we could try the alternative approach"
      no_match:
        - "I think this is caused by a race condition in the DB write"

  - name: no-false-blockers
    severity: WARN
    description: Agent may be inventing blockers to avoid doing work
    patterns:
      - "(?i)\\bwe (?:can't|cannot|won't be able to)[^\\n]{0,40}(?:until|without|unless)[^\\n]{0,40}(?:first|before)\\b"
      - "(?i)\\b(?:blocked by|prerequisite|need to [^\\n]{0,20} before we can)\\b[^\\n]{0,30}(?:so we (?:can't|cannot)|first|before)\\b"
    examples:
      match:
        - "We can't build the Docker image until we first set up the registry"
        - "This is blocked by the infra deploy, so we can't proceed"
      no_match:
        - "The CUDA driver depends on the AMI version"
        - "This service depends on the auth service being available"

  - name: no-test-skipping
    severity: BLOCK
    description: Agent must not skip or defer tests
    patterns:
      - "(?i)\\b(?:we can skip|let's skip|skip running|skip over|skip the|without running|don't need to run)\\b[^\\n]{0,30}\\b(?:tests?|test suite|linting|type check)"
      - "(?i)\\b(?:tests?|testing|test coverage)\\b[^\\n]{0,30}\\b(?:can be added|add them|write them|handle that)\\b[^\\n]{0,20}(?:later|in a follow-up|separately|next)"
      - "(?i)\\b(?:we (?:don't|won't) need|no need for)\\b[^\\n]{0,20}\\b(?:tests?|test cases?|unit tests?)\\b"
    examples:
      match:
        - "We can skip running the tests for now"
        - "Tests can be added later in a follow-up PR"
        - "We don't need tests for this change"
      no_match:
        - "Skip this test if CUDA is not available"
        - "The test suite runs in CI"

  - name: no-placeholder-code
    severity: BLOCK
    description: Agent must not leave placeholder or stub code instead of implementing
    patterns:
      - "(?i)\\b(?:TODO|FIXME|HACK|XXX)\\b[^\\n]{0,30}(?:implement|fill in|complete|add)"
      - "(?i)\\b(?:skeleton|scaffold|stub|placeholder)\\b[^\\n]{0,20}(?:code|implementation|function)[^\\n]{0,30}(?:you can|to be|fill)"
      - "(?i)\\b(?:you can fill in|to be completed|to be implemented|implement this yourself)\\b"
      - "(?i)\\bpass\\b\\s*#[^\\n]{0,30}(?:TODO|implement|fill|placeholder)"
      - "(?i)\\braise NotImplementedError\\b(?![^\\n]*(?:abstract|@abstractmethod|ABC|Protocol))"
    examples:
      match:
        - "# TODO: implement the actual logic here"
        - "Here's a skeleton implementation you can fill in"
        - "raise NotImplementedError"
      no_match:
        - "The scaffold tool generates project templates"
        - "This placeholder text appears in the UI mockup"
        - "raise NotImplementedError  # abstract method via ABC"

  - name: no-error-handling-deferral
    severity: WARN
    description: Agent should not defer error handling or edge cases
    patterns:
      - "(?i)\\b(?:error handling|edge cases?|error paths?)\\b[^\\n]{0,30}(?:can be added later|skip for now|handle later|in a follow-up)"
      - "(?i)\\b(?:skip|skip over|don't need)\\b[^\\n]{0,20}(?:null checks?|type checking|validation|error handling)"
      - "(?i)\\bfor now[^\\n]{0,10}(?:ignore|skip|omit)[^\\n]{0,20}(?:errors?|exceptions?|edge cases?)"
    examples:
      match:
        - "Error handling can be added later"
        - "We can skip null checks for now"
        - "For now, ignore edge cases"
      no_match:
        - "The error handling middleware catches all uncaught exceptions"

  - name: no-hardcoded-shortcuts
    severity: WARN
    description: Agent should not use hardcoded values as shortcuts
    patterns:
      - "(?i)\\b(?:hardcode|hardcoded|hard[- ]?code|hard[- ]?coded)\\b[^\\n]{0,20}(?:for now|temporarily|to be fixed|as a quick)"
      - "(?i)\\b(?:magic (?:number|string|value|constant))\\b[^\\n]{0,20}(?:for now|temporarily)"
    examples:
      match:
        - "I'll hardcode the URL for now"
        - "Using a hardcoded value temporarily"
      no_match:
        - "Avoid hardcoded values in configuration"

  - name: no-user-delegation
    severity: BLOCK
    description: Agent must not delegate remaining work back to the user
    patterns:
      - "(?i)\\b(?:you'll need to|you should|you'll want to|you'll have to|you can then)\\b[^\\n]{0,40}\\b(?:add|implement|fill|complete|customize|write|finish|handle)\\b"
      - "(?i)\\b(?:the rest is|left as an exercise|as an exercise for)\\b"
      - "(?i)(?:\\.{3}|\\u2026)[^\\n]{0,20}(?:rest of|remaining|similar|and so on|etc)"
      - "(?i)(?:#|//) \\.{3}\\s*(?:rest|remaining|similar|implementation|code)"
    examples:
      match:
        - "I've set up the structure -- you'll need to add the business logic"
        - "The rest is left as an exercise"
        - "// ... rest of implementation"
      no_match:
        - "You'll need to install Python 3.10 first"
        - "See the docs for additional configuration options"

  - name: no-simplified-delivery
    severity: BLOCK
    description: Agent must not deliver a simplified version unless asked for one
    patterns:
      - "(?i)\\b(?:simplified|basic|proof of concept|bare[- ]?bones|rough)\\b[^\\n]{0,20}(?:version|implementation|example|draft)"
      - "(?i)\\b(?:for simplicity|to keep[^\\n]{0,10}simple|for brevity)\\b[^\\n]{0,30}(?:using|omit|skip|left out|didn't|not including)"
      - "(?i)\\b(?:beyond|out of|outside) (?:the )?scope\\b"
    examples:
      match:
        - "Here's a simplified version that covers the main cases"
        - "For simplicity, I'm using a flat list instead of a tree"
        - "That's beyond the scope of this change"
      no_match:
        - "The simplified Bernoulli model is used in the paper"
        - "This is a proof of concept the user asked us to build"

  - name: instruction-compliance
    severity: BLOCK
    description: Agent must follow instruction files (CLAUDE.md, .cursorrules)
    instruction_check: true
    patterns: []

  - name: no-partial-execution
    severity: BLOCK
    description: Agent must not do only part of what was asked
    patterns:
      - "(?i)\\bfor (?:the|this) (?:first|initial) (?:pass|phase|iteration)\\b[^\\n]{0,30}(?:just|only|limit)"
      - "(?i)\\bI'?ll (?:just|only) (?:do|handle|fix|address) [^\\n]{0,30}(?:for now|first|to start)"
      - "(?i)\\b(?:minimal|bare[- ]?minimum|MVP|quick[- ]?win)\\b[^\\n]{0,20}(?:version|implementation|fix)"
    examples:
      match:
        - "For this first pass, I'll just handle the Python changes"
        - "I'll only address the critical issues for now"
        - "Let's do a minimal version first"
      no_match:
        - "The minimal reproducible example shows the bug"

  - name: no-unsolicited-alternatives
    severity: WARN
    description: Agent should not suggest alternative approaches when user already chose one
    patterns:
      - "(?i)\\b(?:alternatively|a different approach)\\b[^\\n]{0,40}\\b(?:we could|you could|I'd|let's|consider|would be)\\b"
      - "(?i)\\b(?:you could also|we could also|another thing to consider)\\b"
      - "(?i)\\ba (?:simpler|cleaner|better|easier) (?:way|approach) (?:would be|might be|is)\\b"
    examples:
      match:
        - "Alternatively, we could use a serverless function instead"
        - "A simpler approach would be to use S3 events"
      no_match:
        - "The alternative implementation uses async generators"
        - "Alternatively is defined in the glossary"

  - name: no-cost-scaring
    severity: WARN
    description: Agent should not use cost as a reason to reduce scope (user knows their budget)
    patterns:
      - "(?i)\\b(?:cost|expensive|pricey|budget)\\b[^\\n]{0,30}\\b(?:careful|watch out|consider|be aware|might want)\\b"
      - "(?i)\\b(?:save money|reduce cost|cheaper|more affordable)\\b[^\\n]{0,20}(?:if we|by|using)"
    examples:
      match:
        - "This might get expensive — be careful with the instance count"
        - "We could save money by using spot instances instead"
      no_match:
        - "Cost: 8x g5.xlarge on-demand = $8.05/hr"
